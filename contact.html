<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="cnt">
        <div class="contact-info-box">
            <h1>Get in <span class="highlight">Touch</span></h1>
            <h2>Liyutsa Zirange</h2>
            <h3>Maharashtra, India</h3>

            <div class="social-buttons">
                <button onclick="window.location.href='https://github.com/Liyu2805'">GitHub</button>
                <button onclick="window.location.href='https://www.linkedin.com/in/liyutsa-zirange-bb1a76195'">LinkedIn</button>
            </div>
        </div>

        <div class="cntform">
            <p class="form-intro">
                I'd love to hear from you! Whether you have a question, want to discuss a project, or just want to say hello, feel free to reach out.
            </p>

            <form action="https://formspree.io/f/meobkaeb" method="POST">
                <div class="form-group">
                    <label for="name" class="label-text">Your name:</label>
                    <input type="text" name="name" id="name" required>
                </div>

                <div class="form-group">
                    <label for="email" class="label-text">Your email:</label>
                    <input type="email" name="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="message" class="label-text">Your message:</label>
                    <textarea name="message" id="message" rows="4" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send</button>
            </form>
        </div>
    </div>
</body>

</html>
